name: project3_horseshoe
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - jupyterlab
  - geopandas
  - shapely
  - pyproj
  - rasterio
  - xarray
  - rioxarray
  - obspy         # Sismik veri çekimi için
  - pytorch       # ML modelleri için (FaultSeg)
  - torchvision
  - scikit-learn
  - matplotlib
  - pyyaml
  - pip:
    - sentinelsat # Sentinel-1 indirmesi için
    - mintpy      # InSAR zaman serisi